<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Do You Love Me?</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffe6f0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .top-image {
      width: 200px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    h1 {
      margin-bottom: 20px;
      color: #ff4d88;
    }

    .buttons {
      display: flex;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #yes {
      background-color: #4CAF50;
      color: white;
    }

    #no {
      background-color: #ff4d4d;
      color: white;
      position: relative;
    }

    /* POPUP */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      position: relative;
      background: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      max-width: 300px;
      animation: pop 0.3s ease;
    }

    .modal-content img {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }

    /* CLOSE BUTTON (❌) */
    .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 20px;
      cursor: pointer;
      color: #999;
    }

    .close-btn:hover {
      color: #ff4d88;
    }

    @keyframes pop {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="reply-me.png" class="top-image">

    <h1>Will you be my bsf? ❤️</h1>

    <div class="buttons">
      <button id="yes">Yes 💖</button>
      <button id="no">No 😢</button>
    </div>
  </div>

  <!-- POPUP -->
  <div class="modal" id="popup">
    <div class="modal-content">
      
      <!-- ❌ CLOSE BUTTON HERE -->
      <span class="close-btn" onclick="closePopup()">✖</span>

      <h2>👍 I knew it! 😍</h2>
      <p>You just made my day 💕</p>

      <img src="hello.png.jpg">
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const popup = document.getElementById("popup");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 200 - 100;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    });

    yesBtn.addEventListener("click", () => {
      popup.style.display = "flex";
    });

    function closePopup() {
      popup.style.display = "none";
      noBtn.style.transform = "translate(0,0)"; // reset button
    }
  </script>

</body>
</html>
